<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Đăng Nhập</title>

    <link rel="stylesheet"
          href="/css/user/style.css">

    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Montserrat:wght@300;400;500;700&display=swap"
          rel="stylesheet">

</head>

<body>

<section class="auth-page">

    <div class="auth-box">

        <h1>Đăng Nhập</h1>

        <form action="/login"
              method="post">

            <input type="text"
                   name="username"
                   placeholder="Username"
                   required>

            <input type="password"
                   name="password"
                   placeholder="Password"
                   required>

            <button type="submit">
                ĐĂNG NHẬP
            </button>

        </form>

        <!-- ERROR -->
        <p class="auth-error"
           th:if="${error}"
           th:text="${error}">
        </p>

        <div class="auth-link">

            Chưa có tài khoản?

            <a href="/register">
                Đăng ký
            </a>

        </div>

    </div>

</section>

</body>
</html>
