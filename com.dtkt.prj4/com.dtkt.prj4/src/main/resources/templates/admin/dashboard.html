<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>DTKT ADMIN</title>

    <link rel="stylesheet"
          href="/css/admin/admin.css">

    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Montserrat:wght@300;400;500;700&display=swap"
          rel="stylesheet">

</head>

<body>

<div class="admin-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">

        <div class="admin-logo">

            DTKT ADMIN

        </div>

        <nav class="sidebar-menu">

            <a href="/admin">
                Dashboard
            </a>

            <a href="/admin/products">
                Products
            </a>

            <a href="/admin/categories">
                Categories
            </a>

            <a href="/admin/orders">
                Orders
            </a>

            <a href="/admin/users">
                Users
            </a>

            <a href="/logout">
                Logout
            </a>

        </nav>

    </aside>


    <!-- MAIN -->
    <main class="admin-main">

        <!-- TOPBAR -->
        <div class="admin-topbar">

            <h1>
                DASHBOARD
            </h1>

            <div class="admin-user">

                ADMIN

            </div>

        </div>


        <!-- STATS -->
        <section class="stats-grid">

            <div class="stat-card">

                <h2 th:text="${totalProducts}"></h2>

                <p>Total Products</p>

            </div>

            <div class="stat-card">

                <h2 th:text="${totalOrders}"></h2>

                <p>Total Orders</p>

            </div>

            <div class="stat-card">

                <h2 th:text="${totalUsers}"></h2>

                <p>Users</p>

            </div>

            <div class="stat-card">

                <h2 th:text="${revenue}"></h2>

                <p>Revenue</p>

            </div>

        </section>


        <!-- QUICK ACTION -->
        <section class="quick-actions">

            <h2>QUICK ACTION</h2>

            <div class="action-grid">

                <a href="/admin/products"
                   class="action-card">
                    MANAGE PRODUCTS
                </a>

                <a href="/admin/categories"
                   class="action-card">
                    MANAGE CATEGORIES
                </a>

                <a href="/admin/orders"
                   class="action-card">

                    VIEW ORDERS

                </a>

            </div>

        </section>

    </main>

</div>

</body>
</html>
